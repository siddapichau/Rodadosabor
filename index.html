<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roda do Sabor</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsivo.css">
</head>
<body>

<header>
  <div class="logo">
    <!-- <img src="assets/imagens/logo.png" width="48"> -->
    🎰 Roda do Sabor
  </div>
  <div class="moedas">💰 <span id="saldo-moedas">20</span></div>
  <button id="btn-anuncio" class="btn-anuncio">📺 +3 Moedas</button>
</header>

<main>
  <section class="area-roleta">
    <div class="marcador">▼</div>
    <div class="container-roleta"><div id="roleta"></div></div>
    <button id="btn-girar" class="btn-girar">GIRAR!</button>
    <div id="resultado" class="resultado"></div>
    <div class="efeito-caixa">
      Efeito:
      <select id="seletor-efeito">
        <option value="confete">🎉 Confete</option>
        <option value="fogos">🎆 Fogos</option>
        <option value="estrelas">⭐ Estrelas</option>
        <option value="coracoes">💖 Corações</option>
        <option value="raios">⚡ Raios</option>
        <option value="espiral">🌀 Espiral</option>
      </select>
      <button id="btn-mudo">🔊</button>
    </div>
  </section>

  <section><h3>Comidas na roleta</h3><div id="lista-itens"></div></section>
  <section><h3>Temas</h3><div id="temas"></div></section>
  <section><h3>Sons</h3>
    Giro:<div id="sons-giro"></div>
    Parada:<div id="sons-parada"></div>
    Vitória:<div id="sons-vitoria"></div>
  </section>
  <section><h3>Receitas</h3><div id="lista-receitas"></div></section>
</main>

<div id="camada-efeitos"></div>

<script src="js/banco.js"></script>
<script src="js/comidas.js"></script>
<script src="js/sons.js"></script>
<script src="js/efeitos.js"></script>
<script src="js/core.js"></script>
<script src="js/temas.js"></script>
<script src="js/app.js"></script>
</body>
</html>
