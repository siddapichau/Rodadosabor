<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta da Fortuna</title>
    <!-- Link para o CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Topo com a Logo e Moedas -->
    <header class="header-container">
        <img src="logo.png" alt="Logo" class="app-logo">
        <div class="moedas-container">
            🪙 <span id="saldo-moedas">0</span>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="main-content">
        <div class="roleta-wrapper">
            <!-- Canvas da Roleta -->
            <canvas id="canvas-roleta" width="350" height="350"></canvas>
            <button id="btn-girar">GIRAR!</button>
        </div>

        <!-- Controles -->
        <div class="controles-botoes">
            <button id="btn-abrir-comidas" class="btn-primary">Configurar Itens (Comida)</button>
            <button id="btn-anuncio" class="btn-ad">📺 Ver Anúncio (+3 Moedas)</button>
        </div>
    </main>

    <!-- Pop-up/Modal de Seleção de Comidas -->
    <div id="modal-comidas" class="modal">
        <div class="modal-content">
            <span class="fechar-modal">&times;</span>
            <h2>Selecione as Comidas para a Roleta</h2>
            <div class="busca-container">
                <input type="text" id="busca-comida" placeholder="Buscar comida...">
            </div>
            <div id="lista-comidas-opcoes" class="grid-comidas">
                <!-- Inserido dinamicamente via JS -->
            </div>
            <button id="btn-salvar-roleta" class="btn-primary">Atualizar Roleta</button>
        </div>
    </div>

    <!-- Container do Iframe do Anúncio (Simulação) -->
    <div id="container-anuncio-iframe" class="iframe-overlay">
        <div class="iframe-box">
            <div class="iframe-header">
                Aguarde <span id="cronometro-anuncio">20</span> segundos para ganhar suas moedas...
            </div>
            <!-- Aqui você pode trocar o src pelo link do anúncio/página que quiser -->
            <iframe id="anuncio-frame" src="about:blank"></iframe>
        </div>
    </div>

    <!-- Scripts Externos -->
    <script href="core.js" src="core.js"></script>
    <script href="app.js" src="app.js"></script>
</body>
</html>
