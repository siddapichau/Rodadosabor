name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create package.json if missing
        run: |
          if [ ! -f package.json ]; then
            echo '{"name":"app","version":"1.0.0","dependencies":{"@capacitor/core":"^5.7.0","@capacitor/android":"^5.7.0"},"devDependencies":{"@capacitor/cli":"^5.7.0"}}' > package.json
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor globally
        run: npm install -g @capacitor/cli

      - name: Init Capacitor
        run: npx cap init RodaDoSabor com.siddapichau.rodasabor --web-dir .

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
