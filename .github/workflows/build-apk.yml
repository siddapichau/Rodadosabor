name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp -f *.html *.css *.js *.json *.png *.webmanifest sw.js www/ 2>/dev/null || true

      - name: Install dependencies
        run: npm install

      # Adiciona a plataforma Android baseada no seu capacitor.config.json
      - name: Add Android
        run: npx cap add android

      # Instala o gerador de ícones, copia a sua logo e gera os ícones do app
      - name: Generate App Icons
        run: |
          npm install @capacitor/assets --save-dev
          mkdir -p assets
          cp logo.png assets/icon.png 2>/dev/null || true
          cp logo.png assets/splash.png 2>/dev/null || true
          npx capacitor-assets generate --android || true

      # Injeta o SEU ID do aplicativo AdMob no AndroidManifest do APK
      - name: Fix AdMob manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<\/application>/i \    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-1466567886645880~6367009472"/>\n    <meta-data android:name="com.google.android.gms.ads.flag.OPTIMIZE_AD_LOADING" android:value="true"/>' "$MANIFEST"
          fi

      - name: Sync Capacitor
        run: npx cap sync

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
