name: Copy files to www

on:
  push:
    branches: [ main ]

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create www directory if not exists
        run: mkdir -p www

      - name: Copy all web files to www
        run: |
          # Copia apenas arquivos web (html, css, js, json, png, etc.)
          cp -f *.html *.css *.js *.json *.png *.webmanifest sw.js www/ 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add www/
          git diff --staged --quiet || git commit -m "Auto-copy web files to www"
          git push
