name: Copy files to www

on:
  push:
    branches: [ main ]

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create www directory
        run: mkdir -p www

      - name: Copy all web files to www
        run: |
          # Copia todos os arquivos web da raiz (incluindo subpastas se houver)
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.json" -o -name "*.png" -o -name "*.webmanifest" -o -name "sw.js" \) -exec cp -v {} www/ \;

      - name: List files in www
        run: ls -la www/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add www/
          git diff --staged --quiet || git commit -m "Auto-copy web files to www"
          git push
