<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel DEV - Roda do Sabor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1a2e; color: white; padding: 2rem; display: flex; justify-content: center; }
        .box { background: #16213e; padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: #f5b342; text-align: center; margin-bottom: 1.5rem; font-weight: 800; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #a5b1c2; }
        input { width: 100%; margin-bottom: 1.5rem; padding: 1rem; border-radius: 8px; border: 1px solid #2c3e50; background: #0f172a; color: #f5b342; font-size: 1.2rem; font-weight: bold; box-sizing: border-box; text-align: center; }
        button { width: 100%; margin-bottom: 1rem; padding: 1rem; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        
        .btn-vip { background: linear-gradient(135deg, #f5b342, #e94b3c); color: white; }
        .btn-remove { background: #e74c3c; color: white; }
        .btn-save { background: #27ae60; color: white; }
        button:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        
        .status { text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; color: #a5b1c2; background: #0f172a; padding: 0.8rem; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🛠️ Painel GOD MODE</h2>
        <div id="authStatus" class="status"><i class="fas fa-spinner fa-spin"></i> A ligar ao Servidor...</div>

        <label>Moedas na Conta (Sincronizado via Firebase):</label>
        <input type="number" id="devCoins" value="0">
        
        <button class="btn-save" onclick="saveDevData()">💾 Injetar Moedas</button>
        <button class="btn-vip" onclick="addVip()">👑 Dar VIP + NoAds (30 Dias)</button>
        <button class="btn-remove" onclick="removeVip()">🗑️ Remover VIP / NoAds</button>
        
        <a href="index.html" style="color:#42a5f5; text-align:center; display:block; margin-top: 1.5rem; text-decoration: none; font-weight: 600;">⬅ Voltar ao Aplicativo</a>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- Puxa a sua configuração segura -->
    <script src="firebase.js"></script>

    <script>
        // Inicializa Firebase no Painel Dev
        if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        
        let currentUserUid = null;
        let currentState = {};

        const statusEl = document.getElementById('authStatus');
        const coinsInput = document.getElementById('devCoins');

        // Escuta ativamente quem está logado
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUserUid = user.uid;
                
                // Formata o email ou aviso
                let identificacao = user.isAnonymous ? 'Conta Convidado' : (user.email || 'Conta Google');
                statusEl.innerHTML = `✅ Conectado direto ao servidor<br><strong style="color: #27ae60;">${identificacao}</strong>`;
                
                // Puxa os dados direto do Firebase em tempo real
                database.ref('users/' + currentUserUid + '/appState').once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        currentState = snapshot.val();
                        coinsInput.value = currentState.coins || 0;
                    } else {
                        currentState = JSON.parse(localStorage.getItem('rodaDoSaborState') || '{}');
                        coinsInput.value = currentState.coins || 0;
                    }
                });
            } else {
                statusEl.innerHTML = "❌ Não conectado.<br>Abra o <strong>index.html</strong> primeiro para gerar uma sessão.";
            }
        });

        // Função universal para injetar dados no servidor
        function updateDatabase(newDataMsg) {
            if (!currentUserUid) {
                alert("Erro: Você não está logado no sistema.");
                return;
            }
            
            // Força a atualização local primeiro por segurança
            localStorage.setItem('rodaDoSaborState', JSON.stringify(currentState));
            
            // Dispara para o Google Firebase
            database.ref('users/' + currentUserUid + '/appState').update(currentState)
                .then(() => alert("SUCESSO: " + newDataMsg))
                .catch(e => alert("ERRO DE SERVIDOR: " + e.message));
        }

        function addVip() {
            const trintaDias = 30 * 24 * 60 * 60 * 1000;
            currentState.vipUntil = Date.now() + trintaDias;
            currentState.noAdsUntil = Date.now() + trintaDias;
            updateDatabase("👑 VIP e NoAds ativados no Firebase!");
        }

        function removeVip() {
            currentState.vipUntil = 0;
            currentState.noAdsUntil = 0;
            updateDatabase("🗑️ VIP e NoAds apagados do servidor.");
        }

        function saveDevData() {
            currentState.coins = parseInt(coinsInput.value) || 0;
            updateDatabase(`💰 Saldo atualizado para ${currentState.coins} moedas!`);
        }
    </script>
</body>
</html>
