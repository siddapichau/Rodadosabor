<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Painel de Teste - Moedas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #2a2a40;
            border-radius: 20px;
            padding: 30px 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #f1c40f;
        }
        .sub {
            color: #aaa;
            margin-bottom: 30px;
        }
        .coin-display {
            background: #3a3a55;
            border-radius: 60px;
            padding: 20px;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            border: 2px solid #f1c40f;
        }
        .coin-display span {
            color: #f1c40f;
        }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 120px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-add {
            background: #2ecc71;
            color: #fff;
            box-shadow: 0 4px 0 #1e8b4c;
        }
        .btn-add:hover {
            background: #27ae60;
        }
        .btn-remove {
            background: #e74c3c;
            color: #fff;
            box-shadow: 0 4px 0 #a93226;
        }
        .btn-remove:hover {
            background: #c0392b;
        }
        .btn-reset {
            background: #f39c12;
            color: #fff;
            box-shadow: 0 4px 0 #b86d0e;
            margin-top: 15px;
            width: 100%;
        }
        .btn-reset:hover {
            background: #d68910;
        }
        .info {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888;
            background: #22223b;
            padding: 12px;
            border-radius: 10px;
        }
        .info code {
            background: #111;
            padding: 2px 8px;
            border-radius: 6px;
            color: #f1c40f;
        }
        .clear-btn {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .clear-btn:hover {
            background: #444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🪙 Painel de Moedas</h1>
        <p class="sub">Teste seu app sem precisar assistir anúncios</p>

        <div class="coin-display">
            <span id="coinCount">0</span>
        </div>

        <div class="controls">
            <button class="btn btn-add" id="add10">+10</button>
            <button class="btn btn-add" id="add50">+50</button>
            <button class="btn btn-remove" id="remove10">-10</button>
            <button class="btn btn-remove" id="remove50">-50</button>
        </div>

        <button class="btn btn-reset" id="resetCoins">⟳ Zerar (0)</button>
        <button class="clear-btn" id="clearStorage">🗑️ Limpar todo o storage</button>

        <div class="info">
            <strong>Saldo atual:</strong> <span id="coinDisplayInfo">0</span> moedas<br>
            <small>Os dados são lidos do <code>localStorage</code> do seu app.</small>
        </div>
    </div>

    <script>
        (function() {
            // Chave usada no app.js
            const STORAGE_KEY = 'appState';

            function getState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        return JSON.parse(raw);
                    }
                } catch (e) {}
                // Se não existir, cria um estado padrão com 0 moedas
                return { coins: 0 };
            }

            function saveState(state) {
                // Preserva outras propriedades que possam existir no storage
                try {
                    const existing = localStorage.getItem(STORAGE_KEY);
                    let fullState = {};
                    if (existing) {
                        fullState = JSON.parse(existing);
                    }
                    // Atualiza apenas coins
                    fullState.coins = state.coins;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(fullState));
                } catch (e) {
                    console.error('Erro ao salvar:', e);
                }
                updateDisplay();
            }

            function updateDisplay() {
                const state = getState();
                const coins = state.coins || 0;
                document.getElementById('coinCount').textContent = coins;
                document.getElementById('coinDisplayInfo').textContent = coins;
            }

            // Ações
            function addCoins(amount) {
                const state = getState();
                state.coins = (state.coins || 0) + amount;
                saveState(state);
            }

            function removeCoins(amount) {
                const state = getState();
                let coins = (state.coins || 0) - amount;
                if (coins < 0) coins = 0;
                state.coins = coins;
                saveState(state);
            }

            function resetCoins() {
                const state = getState();
                state.coins = 0;
                saveState(state);
            }

            function clearAllStorage() {
                if (confirm('Isso apagará TODOS os dados do app (moedas, temas, receitas desbloqueadas, etc.). Continuar?')) {
                    localStorage.removeItem(STORAGE_KEY);
                    updateDisplay();
                    alert('Storage limpo! Recarregue a página do app para ver o estado inicial.');
                }
            }

            // Vincular botões
            document.getElementById('add10').addEventListener('click', () => addCoins(10));
            document.getElementById('add50').addEventListener('click', () => addCoins(50));
            document.getElementById('remove10').addEventListener('click', () => removeCoins(10));
            document.getElementById('remove50').addEventListener('click', () => removeCoins(50));
            document.getElementById('resetCoins').addEventListener('click', resetCoins);
            document.getElementById('clearStorage').addEventListener('click', clearAllStorage);

            // Atualiza ao carregar
            updateDisplay();

            // Escuta mudanças em outras abas (opcional)
            window.addEventListener('storage', (e) => {
                if (e.key === STORAGE_KEY) {
                    updateDisplay();
                }
            });
        })();
    </script>
</body>
</html>
